<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>A‑Traktor Navigator V2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body,#map{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111}
#map{height:100%}
.panel{
position:fixed;z-index:1000;left:12px;right:12px;
top:max(12px,env(safe-area-inset-top));
background:rgba(255,255,255,.96);
backdrop-filter:blur(12px);
border-radius:18px;padding:12px;
box-shadow:0 8px 30px rgba(0,0,0,.25)
}
input,button,select{
width:100%;box-sizing:border-box;
padding:12px;border-radius:12px;border:1px solid #d0d0d0;
margin-top:8px;font-size:16px;
}
.row{display:flex;gap:8px}
.row button{flex:1}
.suggestions{max-height:180px;overflow:auto}
.suggestion{padding:10px;background:#fff;border-bottom:1px solid #eee;cursor:pointer}
.info{
position:fixed;left:12px;right:12px;
bottom:max(12px,env(safe-area-inset-bottom));
z-index:1000;background:white;border-radius:18px;
padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.25)
}
.small{color:#666;font-size:.9rem}
</style>
</head>
<body>
<div class="panel">
<b>🚜 A‑Traktor Navigator V2</b>
<input id="search" placeholder="Sök ort, adress eller plats">
<div id="suggestions" class="suggestions"></div>

<select id="favorites">
<option value="">⭐ Favoriter</option>
</select>

<div class="row">
<button id="locateBtn">📍 Min position</button>
<button id="clearBtn">🗑️ Rensa</button>
</div>
</div>

<div id="map"></div>

<div class="info" id="info">
<b>Välkommen</b><br>
<span class="small">Sök en plats eller tryck på kartan.</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{zoomControl:false});
map.setView([56.879,14.805],10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19,
 attribution:'© OpenStreetMap'
}).addTo(map);

let userPos=null,userMarker=null,accuracyCircle=null;
let destinationMarker=null,routeLine=null;

const info=document.getElementById('info');

function setInfo(html){ info.innerHTML=html; }

function getFavs(){
 try{return JSON.parse(localStorage.getItem('atraktor_favs')||'[]');}
 catch(e){return [];}
}
function saveFavs(f){ localStorage.setItem('atraktor_favs',JSON.stringify(f)); refreshFavs(); }
function refreshFavs(){
 const sel=document.getElementById('favorites');
 sel.innerHTML='<option value="">⭐ Favoriter</option>';
 getFavs().forEach((f,i)=>{
   const o=document.createElement('option');
   o.value=i; o.textContent=f.name;
   sel.appendChild(o);
 });
}
refreshFavs();

document.getElementById('favorites').addEventListener('change',e=>{
 const fav=getFavs()[e.target.value];
 if(fav) navigateTo([fav.lat,fav.lon],fav.name);
});

if(navigator.geolocation){
 navigator.geolocation.watchPosition(
  pos=>{
   userPos=[pos.coords.latitude,pos.coords.longitude];

   if(!userMarker){
      userMarker=L.circleMarker(userPos,{
        radius:8,color:'#fff',weight:3,
        fillColor:'#1e88ff',fillOpacity:1
      }).addTo(map);

      accuracyCircle=L.circle(userPos,{radius:pos.coords.accuracy}).addTo(map);
      map.setView(userPos,13);
   }else{
      userMarker.setLatLng(userPos);
      accuracyCircle.setLatLng(userPos);
      accuracyCircle.setRadius(pos.coords.accuracy);
   }
  },
  err=>console.log(err),
  {enableHighAccuracy:true,maximumAge:5000}
 );
}

document.getElementById('locateBtn').onclick=()=>{
 if(userPos) map.flyTo(userPos,15);
};

document.getElementById('clearBtn').onclick=()=>{
 if(destinationMarker) map.removeLayer(destinationMarker);
 if(routeLine) map.removeLayer(routeLine);
 destinationMarker=null; routeLine=null;
 setInfo('<b>Rutt rensad</b>');
};

async function geocode(q){
 const r=await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&q='+encodeURIComponent(q));
 return await r.json();
}

async function getRoute(start,end){
 const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
 return await r.json();
}

async function navigateTo(dest,name){
 if(!userPos){ alert('Väntar på GPS-position'); return; }

 if(destinationMarker) map.removeLayer(destinationMarker);
 if(routeLine) map.removeLayer(routeLine);

 destinationMarker=L.marker(dest).addTo(map);

 const data=await getRoute(userPos,dest);
 if(!data.routes || !data.routes.length){
   alert('Ingen rutt hittades');
   return;
 }

 const r=data.routes[0];

 routeLine=L.polyline(
   r.geometry.coordinates.map(c=>[c[1],c[0]]),
   {color:'green',weight:6}
 ).addTo(map);

 map.fitBounds(routeLine.getBounds(),{padding:[40,40]});

 const km=(r.distance/1000).toFixed(1);
 const mins=Math.round((r.distance/1000)/30*60);

 setInfo(`<b>🚜 ${name}</b><br>${km} km<br><span class="small">A‑traktor ETA: ${mins} min</span>`);
}

const search=document.getElementById('search');
const suggestions=document.getElementById('suggestions');
let timer;

search.addEventListener('input',()=>{
 clearTimeout(timer);
 timer=setTimeout(async()=>{
   const q=search.value.trim();
   if(q.length<2){ suggestions.innerHTML=''; return; }

   const results=await geocode(q);
   suggestions.innerHTML='';

   results.forEach(p=>{
      const div=document.createElement('div');
      div.className='suggestion';
      div.textContent=p.display_name;

      div.onclick=()=>{
         suggestions.innerHTML='';
         search.value=p.display_name;
         navigateTo([parseFloat(p.lat),parseFloat(p.lon)],p.display_name);
      };

      suggestions.appendChild(div);
   });
 },300);
});

map.on('click',e=>{
 const lat=e.latlng.lat;
 const lon=e.latlng.lng;

 const html=`
   <b>Vald plats</b><br>
   ${lat.toFixed(5)}, ${lon.toFixed(5)}<br><br>
   <button onclick="window.navPoint(${lat},${lon})">🧭 Navigera hit</button><br><br>
   <button onclick="window.savePoint(${lat},${lon})">⭐ Spara favorit</button>
 `;

 L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
});

window.navPoint=(lat,lon)=>{
 map.closePopup();
 navigateTo([lat,lon],'Kartpunkt');
};

window.savePoint=(lat,lon)=>{
 const name=prompt('Namn på favorit:');
 if(!name) return;
 const favs=getFavs();
 favs.push({name,lat,lon});
 saveFavs(favs);
 alert('Favorit sparad');
};
</script>
</body>
</html>
